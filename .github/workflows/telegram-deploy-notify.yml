name: Telegram Deploy Notify

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read site version
        id: version
        run: |
          VERSION=$(grep -oE 'version [0-9]+\.[0-9]+' index.html | head -n 1 | awk '{print $2}')
          echo "value=${VERSION:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_URL: https://itsjustkos.github.io/Training_plan/
          VERSION: ${{ steps.version.outputs.value }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA=$(printf '%s' "$COMMIT_SHA" | cut -c1-7)
          MESSAGE=$(cat <<EOF
          Сайт обновлен
          Версия: ${VERSION}
          Ссылка: ${SITE_URL}
          Коммит: ${SHORT_SHA}
          EOF
          )

          curl -fsSL -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"
