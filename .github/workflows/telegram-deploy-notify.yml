name: Telegram Deploy Notify

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read site version
        id: version
        run: |
          VERSION=$(grep -oE 'version [0-9]+\.[0-9]+' index.html | head -n 1 | awk '{print $2}')
          echo "value=${VERSION:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_URL: https://itsjustkos.github.io/Training_plan/
          VERSION: ${{ steps.version.outputs.value }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "::error::Missing TELEGRAM_BOT_TOKEN secret"
            exit 1
          fi

          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::error::Missing TELEGRAM_CHAT_ID secret"
            exit 1
          fi

          SHORT_SHA=$(printf '%s' "$COMMIT_SHA" | cut -c1-7)
          MESSAGE=$(cat <<EOF
          Сайт обновлен
          Версия: ${VERSION}
          Ссылка: ${SITE_URL}
          Коммит: ${SHORT_SHA}
          EOF
          )

          RESPONSE_FILE=$(mktemp)
          HTTP_CODE=$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}")

          echo "Telegram HTTP status: ${HTTP_CODE}"
          cat "$RESPONSE_FILE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Telegram request failed"
            exit 1
          fi
