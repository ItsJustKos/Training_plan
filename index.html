<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Неделя 1 — План тренировок</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #e2e8f0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 16px 14px 40px;
}

h1 {
    font-size: 28px;
    margin-bottom: 6px;
    background: linear-gradient(90deg, #38bdf8, #22c55e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 20px;
}

h2 {
    font-size: 16px;
    margin: 0;
}

.day-card {
    margin-bottom: 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
}

.day-header {
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.02);
    cursor: pointer;
}

.day-header span {
    font-size: 12px;
    color: #38bdf8;
}

.day-content {
    padding: 12px;
    display: none;
}

.day-card.active .day-content {
    display: block;
}

.exercise {
    margin-bottom: 12px;
    padding: 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.05);
}

.exercise b {
    font-size: 14px;
}

.badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 11px;
    margin-bottom: 6px;
    background: rgba(56,189,248,0.15);
    color: #38bdf8;
}

textarea {
    width: 100%;
    height: 70px;
    margin-top: 8px;
    background: rgba(15,23,42,0.9);
    color: #e2e8f0;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 8px;
    font-size: 13px;
}

textarea:focus {
    outline: none;
    border-color: #38bdf8;
}

.footer {
    margin-top: 25px;
    text-align: center;
    font-size: 11px;
    color: #64748b;
}

/* Sticky header for mobile */
.sticky-top {
    position: sticky;
    top: 0;
    background: #020617;
    z-index: 10;
    padding-bottom: 10px;
}

</style>
</head>

<body>

<div class="container">

<div class="sticky-top">
<h1>Неделя 1</h1>
<div class="subtitle">Система тренировок</div>
</div>

<!-- DAY TEMPLATE -->
<div class="day-card active">
<div class="day-header"> <h2>День 1 — СИЛОВАЯ</h2> <span>▼</span> </div>
<div class="day-content">

<div class="exercise">
<span class="badge">Ноги</span><br>
<b>Приседания со штангой</b><br>
4×8 → 50 кг<br>
RPE: 7
<textarea data-id="d1e1"></textarea>
</div>

<div class="exercise">
<span class="badge">Грудь</span><br>
<b>Жим штанги лёжа</b><br>
4×10 → 42.5 кг
<textarea data-id="d1e2"></textarea>
</div>

</div>
</div>

<div class="day-card">
<div class="day-header"><h2>День 2 — БЕГ</h2><span>▼</span></div>
<div class="day-content">
<div class="exercise">5 км<textarea data-id="d2e1"></textarea></div>
</div>
</div>

<div class="day-card">
<div class="day-header"><h2>День 3 — СИЛОВАЯ</h2><span>▼</span></div>
<div class="day-content">
<div class="exercise">Становая<textarea data-id="d3e1"></textarea></div>
</div>
</div>

<div class="footer">Дисциплина = результат</div>

</div>

<script>
// localStorage
const areas = document.querySelectorAll("textarea");
areas.forEach(a => {
    const key = a.dataset.id;
    a.value = localStorage.getItem(key) || "";
    a.addEventListener("input", () => {
        localStorage.setItem(key, a.value);
    });
});

// collapse logic
const headers = document.querySelectorAll('.day-header');
headers.forEach(h => {
    h.addEventListener('click', () => {
        const card = h.parentElement;
        card.classList.toggle('active');
    });
});
</script>

</body>
</html>
